name: Release
on:
  push:
    tags:
      - 'v*'

jobs:
  build-cli:
    name: Build CLI (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: vkcl-cli
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: vkcl-cli.exe
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y build-essential cmake
      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake
      - name: Build
        run: cargo build --release -p vkcl-cli

      - name: Stage binary
        shell: bash
        run: |
          mkdir dist
          cp target/release/${{ matrix.artifact }} dist/vkcl-${{ matrix.target }}${{ matrix.os == 'windows-latest' && '.exe' || '' }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: dist/

  build-py:
    name: Build Python wheels (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y build-essential cmake
      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --interpreter python3.12
          working-directory: vkcl-py
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: vkcl-py/dist/*.whl

  release:
    needs: [build-cli, build-py]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create zips
        run: |
          mkdir dist
          zip -j dist/vkcl-cli.zip artifacts/cli-*/*
          zip -j dist/vkcl-py.zip artifacts/wheels-*/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true